{% extends 'base.html' %}
{% load static %}

{% block title %}
    Loguear - Registrar
{% endblock title %}

{% block content %}
    <main class="login-registro">
        <div class="login" id="login">
            <h2>Iniciar Sesión</h2>
            <form method="post" class="form-login">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Nombre de Usuario">
                <input type="password" name="password" placeholder="Contraseña">

                <button type="submit">Iniciar Sesión</button>
            </form>
            <button class="boton-registro" id="boton_registrar">No tengo cuenta</button>
        </div>
        <div class="registro opacity-0" id="registro">
            <h2>Registro</h2>
            <form method="post" enctype="multipart/form-data" class="form-registro">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Nombre de Usuario">
                <input type="password" name="password" placeholder="Contraseña">
                <input type="password" name="confirm_password" placeholder="Repita la Contraseña">
                <input type="text" name="first_name" placeholder="Nombre">
                <input type="text" name="last_name" placeholder="Apellido">
                <input type="text" name="mail" placeholder="Mail">
                <input type="number" name="telefono" placeholder="Telefono">
                <fieldset>
                    <legend>Foto de Perfil</legend>
                    <input type="file" name="foto">
                </fieldset>

                <button type="submit">Registrarse</button>
            </form>
            <button class="boton-login" id="boton_login">Ya tengo cuenta</button>
        </div>
    </main>
{% endblock content %}

{% block scripts %}
    <script src="{% static 'js/login_registro.js' %}"></script>
{% endblock scripts %}
