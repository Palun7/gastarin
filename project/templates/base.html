{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="icon" href="{% static 'img/icono_gastarin.png' %}">
    <title>
        {% block title %}
        {% endblock title %}
    </title>
    <script src="{% static 'js/header.js' %}" defer></script>
</head>
<body>
    {% include 'components/header.html' %}

    {% block content %}
    {% endblock content %}

    {% include 'components/footer.html' %}

    {% block scripts %}
    {% endblock scripts %}
</body>
</html>
